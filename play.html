      { q: "サンゴ礁が「海のゆりかご」と呼ばれる理由は？", choices: ["多くの生きものの産卵・生息場所になるから", "海水をきれいにするから", "海の温度を下げるから"], answer: 0, note: "サンゴ礁は多種多様な海洋生物の産卵場所や隠れ家になっていて、「海のゆりかご」と呼ばれているよ" }

// 各レベルからランダムに出題数分を抽選してQUIZを構築
const QUESTIONS_PER_QUIZ = 5;
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function buildQuiz(){
  const q = {};
  Object.entries(QUIZ_POOL).forEach(([key,lv])=>{
    q[key] = { ...lv, questions: shuffle(lv.questions).slice(0, QUESTIONS_PER_QUIZ) };
  });
  return q;
}
let QUIZ = buildQuiz();

let currentLevel = null;
let qIndex = 0;
let score = 0;
let answered = false;

const levelSelect = document.getElementById('levelSelect');
const quizBox = document.getElementById('quizBox');

Object.entries(QUIZ).forEach(([key, lv])=>{
  const b = document.createElement('button');
  b.className = 'level-btn';
  b.innerHTML = `<span class="emoji">${lv.emoji}</span><span class="label">${lv.label}</span><br><span class="stars">${lv.stars}</span>`;
  b.onclick = ()=> startLevel(key);
  b.dataset.key = key;
  levelSelect.appendChild(b);
});

function startLevel(key){
  currentLevel = key;
  qIndex = 0; score = 0;
  QUIZ[key] = { ...QUIZ_POOL[key], questions: shuffle(QUIZ_POOL[key].questions).slice(0, QUESTIONS_PER_QUIZ) };
  document.querySelectorAll('.level-btn').forEach(b=> b.classList.toggle('active', b.dataset.key===key));
  renderQuestion();
}

function showCorrectPop(){
  const overlay = document.getElementById('correctOverlay');
  const pop = document.getElementById('correctPop');
  overlay.classList.add('show');
  pop.classList.add('show');
  setTimeout(()=>{
    overlay.classList.remove('show');
    pop.classList.remove('show');
  }, 1200);
}

function renderQuestion(){
  answered = false;
  const lv = QUIZ[currentLevel];
  const total = lv.questions.length;
  if(qIndex >= total){ renderResult(); return; }
  const q = lv.questions[qIndex];
  quizBox.innerHTML = `
    <div class="quiz-progress">もんだい ${qIndex+1} / ${total}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-choices">
      ${q.choices.map((c,i)=>`<button class="quiz-choice" data-i="${i}">${c}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <button class="quiz-next" id="qNext">つぎへ →</button>
  `;
  quizBox.querySelectorAll('.quiz-choice').forEach(btn=>{
    btn.onclick = ()=>{
      if(answered) return;
      answered = true;
      const i = Number(btn.dataset.i);
      const correct = q.answer;
      quizBox.querySelectorAll('.quiz-choice').forEach(b=>{
        const bi = Number(b.dataset.i);
        if(bi===correct) b.classList.add('correct');
        else if(bi===i) b.classList.add('wrong');
        b.disabled = true;
      });
      if(i===correct){
        score++;
        showCorrectPop();
      }
      const fb = document.getElementById('qFeedback');
      fb.textContent = (i===correct ? '🎉 せいかい！ ' : '😉 おしい！ ') + q.note;
      fb.classList.add('show');
      document.getElementById('qNext').classList.add('show');
    };
  });
  document.getElementById('qNext').onclick = ()=>{ qIndex++; renderQuestion(); };
}

function renderResult(){
  const lv = QUIZ[currentLevel];
  const total = lv.questions.length;
  let msg = 'また挑戦してね🐟';
  if(score===total) msg = 'パーフェクト！さかな博士だね🏆';
  else if(score >= total*0.6) msg = 'よくできました！🐟';
  quizBox.innerHTML = `
    <div class="result-box">
      <div class="quiz-progress">けっか</div>
      <div class="score">${score} / ${total} 問正解！</div>
      <div class="msg">${msg}</div>
      <button class="retry" onclick="startLevel('${currentLevel}')">🔁 もう一度</button>
      <button class="backlv" onclick="document.getElementById('levelSelect').scrollIntoView({behavior:'smooth'})">レベルを選びなおす</button>
    </div>
  `;
}

quizBox.innerHTML = '<p style="color:#89a;font-size:.9rem;">↑ むずかしさを選んでスタート！</p>';

for(let i=0;i<10;i++){
  const s = document.createElement('span');
  const size = 8+Math.random()*20;
  s.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
  bw.appendChild(s);
}
</script>
