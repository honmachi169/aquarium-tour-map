<style>
  :root { --sea:#0096c7; --sea-deep:#023e8a; --sky:#caf0f8; --sand:#fff9ec; --coral:#ff6b6b; --sun:#ffd166; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif; background:var(--sand); color:#234; }
  header { background:linear-gradient(180deg,#48cae4 0%,#0096c7 60%,#0077b6 100%); color:#fff; text-align:center; padding:26px 16px 30px; position:relative; overflow:hidden; }
  header a.home { color:#fff; text-decoration:none; font-weight:bold; font-size:.88rem; position:absolute; top:14px; left:16px; z-index:5; }
  header h1 { font-size:clamp(1.4rem,4.5vw,2.1rem); text-shadow:0 2px 6px rgba(2,62,138,.4); margin-top:14px; }
  header p.sub { font-size:.9rem; color:#e0f7ff; margin-top:8px; line-height:1.6; }
  .bubbles span { position:absolute; bottom:-40px; border-radius:50%; background:rgba(255,255,255,.18); animation:rise linear infinite; }
  @keyframes rise { to { transform:translateY(-120vh); } }
  main { max-width:760px; margin:0 auto; padding:22px 16px 50px; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
  .controls button { border:2px solid var(--sea); background:#fff; color:var(--sea); border-radius:999px; padding:6px 16px; cursor:pointer; font-size:.85rem; font-family:inherit; font-weight:bold; }
  .controls button.active { background:var(--sea); color:#fff; }
  .rank-list { display:flex; flex-direction:column; gap:12px; }
  .rank-item { display:grid; grid-template-columns:170px 1fr; grid-template-areas:"thumb head" "thumb reason"; column-gap:14px; row-gap:4px; align-items:start; background:#fff; border-radius:16px; padding:14px 16px; box-shadow:0 3px 10px rgba(2,62,138,.1); text-decoration:none; color:#234; transition:transform .15s; border:2px solid transparent; }
  .rank-item:hover { transform:translateY(-3px); border-color:var(--sky); }
  .rank-item.first { border:2px solid var(--sun); background:linear-gradient(160deg,#fffbea 0%,#fff 55%); }
  .rank-item .r-thumb { grid-area:thumb; width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:10px; background:#dbeefb; }
  .rank-item .r-head { grid-area:head; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .rank-item .medal { font-size:1.4rem; line-height:1.2; }
  .rank-item .r-name { font-weight:bold; color:var(--sea-deep); font-size:1rem; }
  .rank-item .r-pref { font-size:.72rem; color:#fff; background:var(--sea); border-radius:999px; padding:1px 9px; white-space:nowrap; }
  .rank-item .r-reason { grid-area:reason; font-size:.84rem; color:#456; line-height:1.65; }
  @media (max-width:560px) {
    .rank-item { grid-template-columns:1fr; grid-template-areas:"head" "thumb" "reason"; }
  }
  .note { text-align:center; font-size:.78rem; color:#89a; margin-top:22px; line-height:1.7; }
  .back { display:block; text-align:center; margin-top:20px; color:var(--sea); font-weight:bold; text-decoration:none; }
  .postlink { display:block; text-align:center; margin:26px auto 0; max-width:340px; background:linear-gradient(90deg,var(--coral),#ff8787); color:#fff; font-weight:bold; font-size:.95rem; text-decoration:none; border-radius:999px; padding:12px 24px; box-shadow:0 3px 12px rgba(255,107,107,.35); transition:transform .15s; }
  .postlink:hover { transform:translateY(-2px); }
</style>
</head>
<body>
<header>
  <div class="bubbles" id="bubbles"></div>
  <a class="home" href="./">← MAPにもどる</a>
  <h1>🏆 かわちゃんの水族館ランキング</h1>
  <p class="sub">100館以上まわった さかなのおにいさんが<br>YouTubeで取材した水族館の中から選ぶ カテゴリー別ベスト5！</p>
</header>
<main>
  <div class="controls" id="rankBtns"></div>
  <div class="rank-list" id="rankList"></div>
  <p class="note">※ランキングはかわちゃんの独断と偏見（愛）です🐟<br>どの水族館もそれぞれの魅力があるよ！</p>
  <a class="postlink" href="posts.html">📸 みんなの投稿機能はこちら →</a>
  <a class="back" href="./">← MAPにもどる</a>
</main>
<script>
fetch('data.json').then(r=>r.json()).then(data=>{
  const ranks = data.rankings || [];
  const byNo = {};
  (data.aquariums||[]).forEach(a=>{ if(a.no) byNo[a.no] = a; });
  const btnWrap = document.getElementById('rankBtns');
  const list = document.getElementById('rankList');
  const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  function show(i){
    document.querySelectorAll('#rankBtns button').forEach((b,j)=>b.classList.toggle('active', j===i));
    list.innerHTML = ranks[i].items.map((it,idx)=>{
      const a = byNo[it.no];
      if(!a) return '';
      const slug = String(it.no).padStart(3,'0');
      const v = (a.videos||[])[0];
      const thumb = v ? `<img class="r-thumb" loading="lazy" src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg" alt="${a.name}">` : `<div class="r-thumb" style="display:flex;align-items:center;justify-content:center;font-size:2rem">🐟</div>`;
      return `<a class="rank-item${idx===0?' first':''}" href="spot/${slug}.html">
        ${thumb}
        <span class="r-head">
          <span class="medal">${MEDALS[idx]||''}</span>
          <span class="r-name">${a.name}</span><span class="r-pref">${a.pref}</span>
        </span>
        <div class="r-reason">${it.reason}</div>
      </a>`;
    }).join('');
  }
  ranks.forEach((r,i)=>{
    const b = document.createElement('button');
    b.textContent = r.title;
    b.onclick = ()=>show(i);
    btnWrap.appendChild(b);
  });
  if(ranks.length) show(0);
});
// あわ演出
const bw = document.getElementById('bubbles');
for(let i=0;i<10;i++){
  const s = document.createElement('span');
  const size = 8+Math.random()*20;
  s.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
  bw.appendChild(s);
}
</script>
</body>
</html>
