<script>
const RANKS = [{"title": "🦈 サメ好きにおすすめ水族館ランキング", "items": [{"name": "アクアワールド茨城県大洗水族館", "pref": "茨城県", "url": "https://aquarium.yasasea.com/spot/004.html", "thumb": "https://i.ytimg.com/vi/tPoM9I6SnTE/hqdefault.jpg", "reason": "サメの飼育種類数は約60種で日本一！日本でも屈指のサメづくしの水族館だよ。\n見たことのないサメに出会える、サメ好きなら一生に一度は行きたい聖地。"}, {"name": "沖縄美ら海水族館", "pref": "沖縄県", "url": "https://aquarium.yasasea.com/spot/007.html", "thumb": "https://i.ytimg.com/vi/aCB7Klfb2W0/hqdefault.jpg", "reason": "2階「サメ博士の部屋」では、世界的にも珍しいオオメジロザメを複数展示。\n飼育が難しい大型の危険ザメたちの生態を、研究員の解説とともにじっくり学べるよ。"}, {"name": "島根県立しまね海洋館アクアス", "pref": "島根県", "url": "https://aquarium.yasasea.com/spot/u079.html", "thumb": "https://aquarium.yasasea.com/assets/photo_aquas.jpg", "reason": "因幡の白兎伝説が残るここでは、神話の海水槽に十数種のサメが悠々と泳ぐ。\n出雲神話ゆかりの地で、サメと兎の伝説に思いを馳せながら眺めてみて。"}, {"name": "海遊館", "pref": "大阪府", "url": "https://aquarium.yasasea.com/spot/006.html", "thumb": "https://i.ytimg.com/vi/z0rx1qVaFco/hqdefault.jpg", "reason": "メインの太平洋水槽には、ジンベエザメを含めて合計10種類ものサメが同居中。\nアカシュモクザメなど個性豊かな仲間たちと一緒に悠々と泳ぐ姿は必見だよ。"}, {"name": "四国水族館", "pref": "香川県", "url": "https://aquarium.yasasea.com/spot/038.html", "thumb": "https://i.ytimg.com/vi/uZaP-DI26dI/hqdefault.jpg", "reason": "ここはサメの見方が面白い水族館。プラネタリウムみたいな暗い部屋で、シュモクザメを下から眺めることができるよ。\nサメのシルエットを味わえる、ユニークな展示が楽しめる。"}]}, {"title": "🐬 パフォーマンスの迫力ランキング", "items": [{"name": "鴨川シーワールド", "pref": "千葉県", "url": "https://aquarium.yasasea.com/spot/008.html", "thumb": "https://i.ytimg.com/vi/d4_GUvzu2Sw/hqdefault.jpg", "reason": "シャチ3頭が大迫力で泳ぐ姿を間近で見られる、日本で唯一の水族館。\nパフォーマンスの迫力はもちろん、洞窟や海の底を旅するような館内の作りもワクワクさせてくれるよ。"}, {"name": "名古屋港水族館", "pref": "愛知県", "url": "https://aquarium.yasasea.com/spot/003.html", "thumb": "https://i.ytimg.com/vi/qrPufojSs2o/hqdefault.jpg", "reason": "延床面積 日本一の広さを誇る水族館。シャチ「リン」のパワフルなパフォーマンスは必見！\n入ってすぐお出迎えしてくれる姿から、もう心をわしづかみにされちゃうよ。"}, {"name": "アドベンチャーワールド", "pref": "和歌山県", "url": "https://aquarium.yasasea.com/spot/009.html", "thumb": "https://i.ytimg.com/vi/fldsqccFixw/hqdefault.jpg", "reason": "飼育頭数40頭近くのイルカやクジラたちが、音楽に合わせて息の合った大迫力のパフォーマンスを見せてくれる。\nSafariパークも一緒に楽しめる、生き物好きにはたまらない理想郷だよ。"}, {"name": "神戸須磨シーワールド", "pref": "兵庫県", "url": "https://aquarium.yasasea.com/spot/002.html", "thumb": "https://i.ytimg.com/vi/oqXKw4i7PAc/hqdefault.jpg", "reason": "西日本で唯一シャチに会える水族館。母「ステラ」と娘「ラン」の親子ならではの息の合ったパフォーマンスは必見。\n2トントラック並みの重さのシャチが跳ねるジャンプの迫力は、何度見ても胸が熱くなるよ。"}, {"name": "マリンワールド海の中道", "pref": "福岡県", "url": "https://aquarium.yasasea.com/spot/013.html", "thumb": "https://i.ytimg.com/vi/U_TNbisPlhs/hqdefault.jpg", "reason": "博多湾を背景にジャンプするイルカパフォーマンスのロケーションは日本屈指の美しさ。\n壁のない開放的なショープールで、海と空とイルカが一体になる瞬間を味わえるよ。"}]}, {"title": "🐙 深海生物ランキング", "items": [{"name": "竹島水族館", "pref": "愛知県", "url": "https://aquarium.yasasea.com/spot/027.html", "thumb": "https://i.ytimg.com/vi/OTTqjtiNlGI/hqdefault.jpg", "reason": "深海生物の展示種類数は日本トップクラス。会える確率が高いのはダイオウグソクムシやオオグソクムシ。\n手書き解説が面白すぎて、読むだけで深海博士になれるよ。"}, {"name": "新江ノ島水族館", "pref": "神奈川県", "url": "https://aquarium.yasasea.com/spot/014.html", "thumb": "https://i.ytimg.com/vi/KezUd0mmqvA/hqdefault.jpg", "reason": "相模湾の深海コーナーが充実。会える確率が高いのはメンダコやダイオウグソクムシ。\nJAMSTEC（海洋研究開発機構）との連携展示で、深海調査の最前線を知ることができるよ。"}, {"name": "アクアマリンふくしま", "pref": "福島県", "url": "https://aquarium.yasasea.com/spot/044.html", "thumb": "https://aquarium.yasasea.com/assets/kawachan_web.png", "reason": "「潮目の海」の深海コーナーでは、会える確率の高いオオグソクムシやタカアシガニに出会える。\n環境水族館ならではの本格的な展示で、深海の不思議を体感できるよ。"}, {"name": "沼津港深海水族館", "pref": "静岡県", "url": "https://aquarium.yasasea.com/spot/u056.html", "thumb": "https://aquarium.yasasea.com/assets/kawachan_web.png", "reason": "世界唯一のシーラカンス・ミュージアム。会える確率が高いのはシーラカンスの冷凍・冷蔵標本とミズヒキガニ。\n駿河湾の深海生物を中心に、深海の不思議を間近で味わえるよ。"}, {"name": "沖縄美ら海水族館", "pref": "沖縄県", "url": "https://aquarium.yasasea.com/spot/007.html", "thumb": "https://i.ytimg.com/vi/aCB7Klfb2W0/hqdefault.jpg", "reason": "「深海への旅」エリアでは、会える確率の高いハマダイや発光するヒカリキンメダイに出会える。\n当館で繁殖に成功したノコギリザメの親子も見られる、深海研究の最前線だよ。"}]}, {"title": "👨‍👩‍👧 親子で行くならオススメランキング", "items": [{"name": "ニフレル", "pref": "大阪府", "url": "https://aquarium.yasasea.com/spot/015.html", "thumb": "https://i.ytimg.com/vi/eCwEprimCZg/hqdefault.jpg", "reason": "いろんな感性にふれるミュージアムだから、色や泳ぎ方をテーマに展示されていて、生き物や文字がわからなくても感覚で楽しめる。\nお隣には万博記念公園やエキスポシティもあって、家族で1日中楽しめるよ。"}, {"name": "大分マリーンパレス水族館 うみたまご", "pref": "大分県", "url": "https://aquarium.yasasea.com/spot/021.html", "thumb": "https://i.ytimg.com/vi/atgbZhl5CCQ/hqdefault.jpg", "reason": "ペンギンやイルカ、クジラが泳ぐ姿を間近で見られる水族館。じゃぶじゃぶ入っていける「あそびーち」がとってもオススメ。\nリニューアルでエリアが広がり、滑り台もできてさらに楽しくなったよ。"}, {"name": "アドベンチャーワールド", "pref": "和歌山県", "url": "https://aquarium.yasasea.com/spot/009.html", "thumb": "https://i.ytimg.com/vi/fldsqccFixw/hqdefault.jpg", "reason": "動物たちはもちろん遊園地も併設しているから、1日中遊んで学べるエデュテインメントパーク。\n海も陸も一度に楽しめる、家族みんなが飽きない理想郷だよ。"}, {"name": "横浜・八景島シーパラダイス", "pref": "神奈川県", "url": "https://aquarium.yasasea.com/spot/005.html", "thumb": "https://i.ytimg.com/vi/uvZ_G83BWLg/hqdefault.jpg", "reason": "島まるごと海のテーマパーク。遊園地もホテルも揃っていて、イルカとキャッチボールなど様々な体験ができるのが特徴。\n1日じゃ足りないボリュームで、家族みんなで盛り上がれるよ。"}, {"name": "鳥羽水族館", "pref": "三重県", "url": "https://aquarium.yasasea.com/spot/001.html", "thumb": "https://i.ytimg.com/vi/pPwD2FiFWXQ/hqdefault.jpg", "reason": "飼育種類数 日本一で、子どもの「これなに？」が止まらない。順路が決まっていないから、ベビーカーでも自分たちのペースで回れるよ。\nラッコやジュゴンなど人気の生き物にも会える、家族連れの定番スポットだよ。"}]}, {"title": "💑 デートにおすすめランキング", "items": [{"name": "マクセル アクアパーク品川", "pref": "東京都", "url": "https://aquarium.yasasea.com/spot/012.html", "thumb": "https://i.ytimg.com/vi/jh9sF6pjwHs/hqdefault.jpg", "reason": "光と音のエンタメ水族館。イルカパフォーマンスは昼と夜で演出が変わるから、夜デートにぴったり。\n幻想的な空間演出で、写真映えする景色をふたりで楽しめるよ。"}, {"name": "アトア（átoa）", "pref": "兵庫県", "url": "https://aquarium.yasasea.com/spot/023.html", "thumb": "https://i.ytimg.com/vi/PkbGhVppLj4/hqdefault.jpg", "reason": "まるで宇宙から見たプラネットのような球体水槽が幻想的。夕方以降に行けば、屋上から神戸の夜景も一望できる。\n冬は温かいココアを飲みながら、ロマンチックな時間を過ごせるよ。"}, {"name": "すみだ水族館", "pref": "東京都", "url": "https://aquarium.yasasea.com/spot/010.html", "thumb": "https://i.ytimg.com/vi/8QsvFSiBT1Q/hqdefault.jpg", "reason": "スカイツリーのお膝元、ペンギンとの距離が近い癒しの都市型水族館。\n634匹のチンアナゴにちなんだ展示など、ふたりで話題にできるユニークなポイントも満載だよ。"}, {"name": "横浜・八景島シーパラダイス", "pref": "神奈川県", "url": "https://aquarium.yasasea.com/spot/005.html", "thumb": "https://i.ytimg.com/vi/uvZ_G83BWLg/hqdefault.jpg", "reason": "島まるごと海のテーマパーク。夕暮れ時は特にロマンチックな雰囲気に包まれるよ。\n5万尾のイワシイリュージョンなど、幻想的な演出をふたりで楽しめる。"}, {"name": "AOAO SAPPORO", "pref": "北海道", "url": "https://aquarium.yasasea.com/spot/037.html", "thumb": "https://i.ytimg.com/vi/JKP80KRhfJI/hqdefault.jpg", "reason": "札幌都心のビルの中に広がる、都会のオアシスのような水族館。夜22時まで営業してるから、夜デートにもぴったり。\n館内のおしゃれな本のコーナーやパン屋さんも、ふたりの時間を彩ってくれるよ。"}]}];
const btnWrap = document.getElementById('rankBtns');
const list = document.getElementById('rankList');
const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣'];
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function show(i){
  document.querySelectorAll('#rankBtns button').forEach((b,j)=>b.classList.toggle('active', j===i));
  list.innerHTML = RANKS[i].items.map((it,idx)=>`
    <a class="rank-item${idx===0?' first':''}" href="${it.url}">
      <img class="r-thumb" loading="lazy" src="${it.thumb}" alt="${esc(it.name)}">
      <span class="r-head">
        <span class="medal">${MEDALS[idx]||''}</span>
        <span class="r-name">${esc(it.name)}</span><span class="r-pref">${esc(it.pref)}</span>
      </span>
      <div class="r-reason">${esc(it.reason)}</div>
    </a>`).join('');
}
RANKS.forEach((r,i)=>{
  const b = document.createElement('button');
  b.textContent = r.title;
  b.onclick = ()=>show(i);
  btnWrap.appendChild(b);
});
if(RANKS.length) show(0);
</script>
</main></body></html>
