<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目指せ100館！全国水族館ツアーMAP | さかなのおにいさん かわちゃんねる</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --sea:#0096c7; --sea-deep:#023e8a; --sky:#caf0f8; --sand:#fff9ec; --coral:#ff6b6b; --sun:#ffd166; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif; background:var(--sand); color:#234; }

  /* ===== ヘッダー ===== */
  header { background:linear-gradient(180deg,#48cae4 0%,#0096c7 60%,#0077b6 100%); color:#fff; text-align:center; padding:26px 16px 0; position:relative; overflow:hidden; }
  header .bubbles { position:absolute; inset:0; pointer-events:none; }
  header .bubbles span { position:absolute; bottom:-30px; border-radius:50%; background:rgba(255,255,255,.18); animation:rise linear infinite; }
  @keyframes rise { to { transform:translateY(-120vh); } }
  h1 { font-size:clamp(1.3rem,4vw,2rem); text-shadow:0 2px 6px rgba(2,62,138,.4); position:relative; }
  header .sub { opacity:.95; font-size:.9rem; margin-top:6px; position:relative; }
  .hero { max-width:420px; width:60%; margin:10px auto -6px; display:block; filter:drop-shadow(0 6px 12px rgba(2,62,138,.35)); position:relative; }
  .counter { max-width:520px; margin:0 auto; padding-bottom:8px; position:relative; }
  .counter .num { font-size:2.1rem; font-weight:bold; color:var(--sun); text-shadow:0 2px 4px rgba(2,62,138,.5); }
  .counter .num small { font-size:1rem; font-weight:normal; color:#fff; }
  .bar { background:rgba(255,255,255,.3); border-radius:999px; height:16px; margin-top:8px; overflow:hidden; border:2px solid rgba(255,255,255,.5); }
  .bar>div { background:linear-gradient(90deg,var(--sun),#ffe29a); height:100%; border-radius:999px; transition:width 1.2s ease-out; }
  .wave { display:block; width:calc(100% + 32px); margin-left:-16px; height:40px; margin-top:14px; }

  /* ===== 地図 ===== */
  #map { height:540px; max-width:1100px; margin:22px auto; border-radius:20px; box-shadow:0 6px 20px rgba(2,62,138,.18); border:4px solid #fff; }

  /* ===== 吹き出しポップアップ ===== */
  .leaflet-popup-content-wrapper { border-radius:18px; box-shadow:0 6px 20px rgba(2,62,138,.3); padding:0; overflow:hidden; border:3px solid var(--sea); }
  .leaflet-popup-content { margin:0; width:250px !important; }
  .leaflet-popup-tip { border:3px solid var(--sea); }
  .pp { font-family:inherit; }
  .pp img.thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
  .pp .inner { padding:10px 12px 12px; }
  .pp .pref { font-size:.7rem; color:#fff; background:var(--sea); border-radius:999px; padding:2px 10px; }
  .pp h3 { font-size:.98rem; margin:6px 0 4px; color:var(--sea-deep); }
  .pp .hl { font-size:.8rem; color:#456; margin-bottom:8px; line-height:1.5; }
  .pp .info { font-size:.78rem; color:#345; background:#f0f8fc; border-radius:10px; padding:7px 10px; margin-bottom:8px; line-height:1.7; }
  .pp .info .note { font-size:.66rem; color:#89a; display:block; }
  .pp .btns { display:flex; flex-wrap:wrap; gap:6px; }
  .pp .btn { font-size:.78rem; font-weight:bold; text-decoration:none; border-radius:999px; padding:5px 12px; }
  .pp .btn.yt { background:var(--coral); color:#fff; }
  .pp .btn.hp { background:var(--sky); color:var(--sea-deep); }
  .pp .btn.sns { background:#eef2f6; color:#334; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; margin:2px 0 6px; }
  .chip { font-size:.72rem; font-weight:bold; background:#e8f6fb; color:#075985; border:1.5px solid #7dd3fc; border-radius:999px; padding:2px 9px; }
  .chip.only { background:#fff7db; color:#92600a; border-color:#f4c430; }
  .visitbtn { font-size:.78rem; font-weight:bold; border-radius:999px; padding:5px 12px; cursor:pointer; border:2px solid #2a9d8f; background:#fff; color:#2a9d8f; font-family:inherit; }
  .visitbtn.on { background:#2a9d8f; color:#fff; }
  .mycount { font-size:.85rem; margin-top:6px; color:#fff; opacity:.95; }
  .mycount b { color:var(--sun); font-size:1.1rem; }
  .card.visited { border-color:#2a9d8f; }
  .card.visited::after { content:"行った！"; position:absolute; top:8px; right:8px; background:#2a9d8f; color:#fff; font-size:.7rem; font-weight:bold; border-radius:999px; padding:3px 10px; transform:rotate(6deg); box-shadow:0 2px 5px rgba(0,0,0,.25); }
  .card { position:relative; }

  /* ===== コメント電光掲示板 ===== */
  .ticker-wrap { background:var(--sea-deep); color:#ffe9a8; overflow:hidden; display:flex; align-items:center; height:38px; position:relative; }
  .ticker-label { flex:none; background:var(--coral); color:#fff; font-size:.75rem; font-weight:bold; padding:0 12px; height:100%; display:flex; align-items:center; z-index:2; }
  .ticker { flex:1; overflow:hidden; white-space:nowrap; position:relative; height:100%; }
  .ticker-inner { display:inline-flex; align-items:center; height:100%; white-space:nowrap; padding-left:100%; animation:tick 40s linear infinite; font-size:.88rem; }
  .ticker-inner span { margin-right:48px; }
  .ticker-inner b { color:#7dd3fc; font-weight:bold; margin-right:6px; }
  @keyframes tick { to { transform:translateX(-100%); } }
  .ticker-post { flex:none; background:var(--sun); color:#5a4000; border:none; font-family:inherit; font-size:.78rem; font-weight:bold; padding:0 14px; height:100%; cursor:pointer; }
  .cmodal { position:fixed; inset:0; background:rgba(2,62,138,.5); display:none; align-items:center; justify-content:center; z-index:2000; }
  .cmodal.open { display:flex; }
  .cmodal .box { background:#fff; border-radius:18px; padding:22px 20px; width:min(92vw,380px); box-shadow:0 10px 40px rgba(0,0,0,.3); }
  .cmodal h3 { color:var(--sea-deep); margin-bottom:12px; }
  .cmodal input, .cmodal textarea { width:100%; border:2px solid var(--sky); border-radius:10px; padding:8px 10px; font-family:inherit; font-size:.9rem; margin-bottom:10px; }
  .cmodal textarea { height:70px; resize:none; }
  .cmodal .row { display:flex; gap:8px; justify-content:flex-end; }
  .cmodal button { border:none; border-radius:999px; padding:8px 18px; font-family:inherit; font-weight:bold; cursor:pointer; }
  .cmodal .send { background:var(--sea); color:#fff; }
  .cmodal .cancel { background:#eee; color:#456; }
  .cmodal .msg { font-size:.8rem; color:var(--coral); min-height:1.2em; margin-bottom:6px; }

  /* ===== スマホ表示 ===== */
  .sp-only { display:none; }
  @media (max-width:640px){
    .pc-only { display:none; }
    .sp-only { display:inline; }
    .ticker-label { display:none; }
    .controls button { padding:6px 12px; font-size:.8rem; }
    #map { height:420px; margin:14px 10px; }
    .grid { padding:0 10px; gap:12px; }
  }
  #tagBtns button { border-color:#f4a261; color:#c9660a; }
  #tagBtns button.active { background:#f4a261; color:#fff; }
  .pp .soon { font-size:.8rem; color:var(--sea); font-weight:bold; }
  .pp.wish .inner { padding-top:12px; }
  .pp .wishtag { font-size:.72rem; color:#889; background:#eef2f6; border-radius:999px; padding:2px 10px; }

  /* ===== 泳ぐ魚の飾り ===== */
  .deco { position:absolute; pointer-events:none; opacity:.95; }
  .deco.iruka { width:min(220px,24vw); left:3%; top:110px; animation:sway 6s ease-in-out infinite; }
  .deco.mendako { width:min(170px,19vw); right:4%; top:150px; animation:sway 7s ease-in-out infinite reverse; }
  @keyframes sway { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-14px) rotate(4deg)} }
  @media (max-width:640px){ .deco.iruka{top:auto;bottom:130px} .deco.mendako{top:auto;bottom:150px} }
  .legend { max-width:1100px; margin:-8px auto 10px; padding:0 20px; font-size:.82rem; color:#567; display:flex; gap:18px; flex-wrap:wrap; }
  footer img.fishline { height:44px; margin:0 8px; vertical-align:middle; }

  /* ===== フィルター＆カード ===== */
  .controls { max-width:1100px; margin:0 auto 14px; padding:0 16px; display:flex; gap:8px; flex-wrap:wrap; }
  .controls button { border:2px solid var(--sea); background:#fff; color:var(--sea); border-radius:999px; padding:6px 16px; cursor:pointer; font-size:.85rem; font-family:inherit; font-weight:bold; }
  .controls button.active { background:var(--sea); color:#fff; }
  .grid { max-width:1100px; margin:0 auto 60px; padding:0 16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:18px; }
  .card { background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 3px 10px rgba(2,62,138,.12); display:flex; flex-direction:column; transition:transform .15s; border:3px solid transparent; }
  .card:hover { transform:translateY(-5px) rotate(-.5deg); border-color:var(--sky); }
  .card img { width:100%; aspect-ratio:16/9; object-fit:cover; background:#cde; }
  .card .body { padding:12px 14px 14px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .card h3 { font-size:1rem; color:var(--sea-deep); }
  .card .pref { font-size:.75rem; color:#fff; background:var(--sea); border-radius:999px; padding:2px 10px; align-self:flex-start; }
  .card .hl { font-size:.82rem; color:#456; flex:1; line-height:1.5; }
  .card .links { display:flex; gap:8px; font-size:.8rem; flex-wrap:wrap; }
  .card a { color:var(--sea); text-decoration:none; font-weight:bold; }
  .card .cinfo { font-size:.76rem; color:#345; background:#f0f8fc; border-radius:10px; padding:6px 10px; line-height:1.6; }
  .card .tab { font-size:.78rem; font-weight:bold; text-decoration:none; border-radius:999px; padding:5px 12px; }
  .card .tab.yt { background:var(--coral); color:#fff; }
  .card .tab.hp { background:var(--sky); color:var(--sea-deep); }
  .card.upcoming { opacity:.7; border:3px dashed var(--sea); }
  .badge-closed { color:var(--coral); font-size:.75rem; font-weight:bold; }
  footer { text-align:center; padding:26px; font-size:.8rem; color:#578; background:var(--sky); }
  footer a { color:var(--sea-deep); }
</style>
</head>
<body>
<header>
  <div class="bubbles" id="bubbles"></div>
  <img class="deco iruka" src="assets/iruka.png" alt="">
  <img class="deco mendako" src="assets/mendako.png" alt="">
  <h1>🐟 目指せ100館！全国水族館ツアーMAP</h1>
  <p class="sub">さかなのおにいさん かわちゃんと巡る、日本全国の水族館！</p>
  <img class="hero" src="assets/kawachan_web.png" alt="さかなのおにいさん かわちゃん">
  <div class="counter">
    <div class="num"><span id="visited">0</span><small> / <span id="goal">100</span>館 制覇中！</small></div>
    <div class="bar"><div id="barfill" style="width:0%"></div></div>
    <div class="mycount">あなたの制覇：<b id="myvisited">0</b> 館 🏆（🐟や⬜を押してチェック！）</div>
  </div>
  <svg class="wave" viewBox="0 0 1200 40" preserveAspectRatio="none"><path d="M0,20 C150,45 350,-5 600,20 C850,45 1050,-5 1200,20 L1200,40 L0,40 Z" fill="#023e8a"/></svg>
</header>

<div class="ticker-wrap">
  <div class="ticker-label">みんなの声</div>
  <div class="ticker"><div class="ticker-inner" id="tickerInner"></div></div>
  <button class="ticker-post" onclick="document.getElementById('cmodal').classList.add('open')"><span class="pc-only">📮 コメントを送る</span><span class="sp-only">📮 コメント</span></button>
</div>

<div class="cmodal" id="cmodal">
  <div class="box">
    <h3>📮 みんなの声に参加しよう！</h3>
    <input id="cname" maxlength="15" placeholder="なまえ（15文字まで）">
    <textarea id="cmsg" maxlength="60" placeholder="すきな水族館・行った感想など（60文字まで）"></textarea>
    <p class="msg" id="cerr"></p>
    <div class="row">
      <button class="cancel" onclick="document.getElementById('cmodal').classList.remove('open')">やめる</button>
      <button class="send" id="csend" onclick="sendComment()">送る🐟</button>
    </div>
  </div>
</div>

<div id="map"></div>
<div class="legend">
  <span>🐟 紹介済み（クリックで動画へ！）</span>
  <span>📍 動画近日公開</span>
  <span>⚪ まだ紹介できていない水族館</span>
</div>

<div class="controls" id="regionBtns"></div>
<div class="controls" id="tagBtns"></div>
<div class="grid" id="cards"></div>

<footer>
  <p><img class="fishline" src="assets/fish_10ZSpO.png" alt=""><img class="fishline" src="assets/fish_14jSCk.png" alt=""><img class="fishline" src="assets/fish_1z-Hbl.png" alt=""></p>
  <p>© 株式会社やさしいうみ ／ <a href="https://www.youtube.com/channel/UCNpTW5hGX4mKr3hxFu_nReA">さかなのおにいさん かわちゃんねる</a></p>
  <p id="updated"></p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== コメント電光掲示板 =====
const COMMENT_API = "https://script.google.com/macros/s/AKfycbz6A_7okvNBKrrygHuOgJ4TQV1YlrB_UPx2_c3hMS9fG6YTunOrrOKROeHdHJg2QzXj/exec";
const SAMPLE_COMMENTS = [
  {name:"かわちゃん", msg:"目指せ100館！みんなの好きな水族館おしえてね🐟"},
  {name:"スタッフ", msg:"📮ボタンからコメントを送ると、ここに流れるよ！"}
];
const GREETING = {name:"かわちゃん", msg:"目指せ100館！みんなの好きな水族館、📮からコメントしてみてね🐟"};
function renderTicker(list){
  const inner = document.getElementById('tickerInner');
  const rest = (list||[]).filter(c=>c.msg!==GREETING.msg);
  const all = [GREETING, ...rest];
  inner.innerHTML = all.map(c=>`<span><b>${esc(c.name)}</b>${esc(c.msg)}</span>`).join('');
  inner.style.animationDuration = Math.max(25, all.length * 7) + 's';
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
async function loadComments(){
  if(!COMMENT_API){ renderTicker(null); return; }
  try{
    const r = await fetch(COMMENT_API);
    const list = await r.json();
    renderTicker(list.reverse());
  }catch(e){ renderTicker(null); }
}
async function sendComment(){
  const name = document.getElementById('cname').value.trim() || 'ななしのさかな';
  const msg = document.getElementById('cmsg').value.trim();
  const err = document.getElementById('cerr');
  if(!msg){ err.textContent = 'コメントを入れてね！'; return; }
  if(!COMMENT_API){ err.textContent = 'コメント機能は準備中だよ、もうすこし待ってね🐟'; return; }
  const btn = document.getElementById('csend');
  btn.disabled = true; btn.textContent = '送信中…';
  try{
    const r = await fetch(COMMENT_API, {method:'POST', body: JSON.stringify({name, msg})});
    const res = await r.json();
    if(res.ok){
      document.getElementById('cmodal').classList.remove('open');
      document.getElementById('cmsg').value=''; err.textContent='';
      loadComments();
    } else {
      err.textContent = res.error || '送信できなかった…もう一度試してね';
    }
  }catch(e){ err.textContent = '送信できなかった…もう一度試してね'; }
  btn.disabled = false; btn.textContent = '送る🐟';
}
loadComments();
setInterval(loadComments, 60000);

// あわ演出
const bw = document.getElementById('bubbles');
for(let i=0;i<14;i++){
  const s = document.createElement('span');
  const size = 8+Math.random()*22;
  s.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
  bw.appendChild(s);
}

const TAGS = {
  "rain": ["☔️ 雨の日におすすめ", "☔️ 雨の日に"],
  "kids": ["👶 未就学児におすすめ", "👶 未就学児に"],
  "same": ["🦈 サメ好きにおすすめ", "🦈 サメ好きに"],
  "dolphin": ["🐬 イルカショーおすすめ", "🐬 イルカショー"],
  "deep": ["🐙 深海生物好きにおすすめ", "🐙 深海好きに"],
  "penguin": ["🐧 ペンギン好きにおすすめ", "🐧 ペンギン好きに"]
};
const REGIONS = {
  "北海道・東北": ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県"],
  "関東": ["茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県"],
  "中部": ["新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県"],
  "近畿": ["三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県"],
  "中国・四国": ["鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県"],
  "九州・沖縄": ["福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"]
};

fetch('data.json').then(r=>r.json()).then(data=>{
  const aqs = data.aquariums;
  const visited = aqs.filter(a=>!a.upcoming).length;
  document.getElementById('visited').textContent = visited;
  document.getElementById('goal').textContent = data.goal;
  setTimeout(()=>{ document.getElementById('barfill').style.width = (visited/data.goal*100)+'%'; }, 300);
  document.getElementById('updated').textContent = '最終更新：'+data.updated;

  const map = L.map('map', {
    minZoom: 5,
    maxBounds: [[20.0,122.0],[46.8,154.0]],
    maxBoundsViscosity: 1.0
  }).setView([37.5,137.0],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);

  function infoBox(a){
    if(!a.fee && !a.closed) return '';
    return `<div class="info">`
      + (a.fee?`💰 大人 ${a.fee}`:'')
      + (a.child?`<br>🧒 子ども ${a.child}`:'')
      + (a.closed?`<br>🗓 休み：${a.closed}`:'')
      + `<span class="note">※最新情報は公式サイトでチェック！</span>`
      + `</div>`;
  }

  const fishIcon = L.divIcon({className:'', html:'<div style="font-size:28px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">🐟</div>', iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-14]});
  const upIcon = L.divIcon({className:'', html:'<div style="font-size:24px;opacity:.55">📍</div>', iconSize:[24,24], iconAnchor:[12,24], popupAnchor:[0,-24]});

  // 行った！チェック（このブラウザに保存）
  let myVisits = new Set(JSON.parse(localStorage.getItem('myVisits')||'[]'));
  function updateMyCount(){
    document.getElementById('myvisited').textContent = myVisits.size;
    localStorage.setItem('myVisits', JSON.stringify([...myVisits]));
  }
  window.toggleVisit = function(name){
    if(myVisits.has(name)) myVisits.delete(name); else myVisits.add(name);
    updateMyCount(); render();
    document.querySelectorAll(`.visitbtn[data-name="${CSS.escape(name)}"]`).forEach(b=>{
      const on = myVisits.has(name);
      b.classList.toggle('on', on);
      b.textContent = on ? '✅ 行った！' : '⬜ 行ったらチェック';
    });
  };
  function visitBtn(a){
    const on = myVisits.has(a.name);
    return `<button class="visitbtn${on?' on':''}" data-name="${a.name}" onclick="toggleVisit('${a.name.replace(/'/g,"\\'")}')">${on?'✅ 行った！':'⬜ 行ったらチェック'}</button>`;
  }

  const ANIMAL_ICONS = {
    "シャチ":"🐋", "ラッコ":"🦦", "ジンベエザメ":"🦈", "シロワニ":"🦈",
    "マンボウ":"🐟", "ピラルクー":"🐠", "エンペラーペンギン":"🐧", "フェアリーペンギン":"🐧",
    "クラゲ":"🪼"
  };
  function animalChips(a){
    const chips = [];
    (a.animals||[]).forEach(name=>{
      chips.push(`<span class="chip">${ANIMAL_ICONS[name]||'🐟'} ${name}</span>`);
    });
    if(a.only) chips.push(`<span class="chip only">⭐ ${a.only}</span>`);
    return chips.length ? `<div class="chips">${chips.join('')}</div>` : '';
  }

  function snsBtns(a){
    if(!a.sns) return '';
    let out = '';
    if(a.sns.x) out += `<a class="btn sns" href="${a.sns.x}" target="_blank">𝕏</a>`;
    if(a.sns.instagram) out += `<a class="btn sns" href="${a.sns.instagram}" target="_blank">📷 Insta</a>`;
    return out;
  }

  const allMarkers = [];
  aqs.forEach(a=>{
    const v = a.videos[0];
    const thumb = v ? `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg` : '';
    const html = `<div class="pp">`
      + (v ? `<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank"><img class="thumb" src="${thumb}" alt="${a.name}"></a>` : '')
      + `<div class="inner">`
      + `<span class="pref">${a.pref}</span>`
      + `<h3>${a.name}</h3>`
      + `<p class="hl">${a.highlight||''}</p>`
      + animalChips(a)
      + infoBox(a)
      + `<div class="btns">`
      + a.videos.map((vv,i)=>`<a class="btn yt" href="https://www.youtube.com/watch?v=${vv.id}" target="_blank">▶ 動画${a.videos.length>1?(i+1):'を見る'}</a>`).join('')
      + (a.url?`<a class="btn hp" href="${a.url}" target="_blank">公式サイト🔗</a>`:'')
      + snsBtns(a)
      + visitBtn(a)
      + (a.upcoming?'<span class="soon">🔜 動画は近日公開！おたのしみに</span>':'')
      + `</div></div></div>`;
    const m = L.marker([a.lat,a.lng],{icon:a.upcoming?upIcon:fishIcon}).addTo(map)
      .bindPopup(html,{maxWidth:270, closeButton:true});
    allMarkers.push({m, tags:a.tags||[], name:a.name});
  });

  // まだ紹介できていない水族館（薄いピン）
  const wishIcon = L.divIcon({className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid #9fb6c9;opacity:.85;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>', iconSize:[14,14], iconAnchor:[7,7], popupAnchor:[0,-8]});
  (data.unvisited||[]).forEach(a=>{
    const html = `<div class="pp wish">`
      + (a.photo?`<img class="thumb" src="${a.photo}" alt="${a.name}">`:'')
      + `<div class="inner">`
      + `<span class="wishtag">🔜 まだ紹介できていない水族館</span>`
      + `<h3>${a.name}</h3>`
      + `<p class="hl">${a.comment||''}<br>動画での紹介をおたのしみに！</p>`
      + animalChips(a)
      + infoBox(a)
      + `<div class="btns">`
      + (a.url?`<a class="btn hp" href="${a.url}" target="_blank">公式サイト🔗</a>`:'')
      + snsBtns(a)
      + visitBtn(a)
      + `</div></div></div>`;
    const m = L.marker([a.lat,a.lng],{icon:wishIcon}).addTo(map).bindPopup(html,{maxWidth:270});
    allMarkers.push({m, tags:a.tags||[], name:a.name});
  });

  const btnWrap = document.getElementById('regionBtns');
  const tagWrap = document.getElementById('tagBtns');
  const cards = document.getElementById('cards');
  let current = 'すべて';
  let currentTag = null;
  ['すべて', ...Object.keys(REGIONS)].forEach(r=>{
    const b = document.createElement('button');
    b.textContent = r;
    if(r===current) b.classList.add('active');
    b.onclick = ()=>{ current=r; document.querySelectorAll('#regionBtns button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
    btnWrap.appendChild(b);
  });
  Object.entries({...TAGS, "__visited":["✅ 行った水族館","✅ 行った館"]}).forEach(([key,label])=>{
    const b = document.createElement('button');
    b.innerHTML = `<span class="pc-only">${label[0]}</span><span class="sp-only">${label[1]}</span>`;
    b.onclick = ()=>{
      if(currentTag===key){ currentTag=null; b.classList.remove('active'); }
      else{
        currentTag=key;
        document.querySelectorAll('#tagBtns button').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
      }
      applyMapFilter(); render();
    };
    tagWrap.appendChild(b);
  });

  function applyMapFilter(){
    allMarkers.forEach(({m,tags,name})=>{
      const show = !currentTag || (currentTag==='__visited' ? myVisits.has(name) : tags.includes(currentTag));
      if(show){ if(!map.hasLayer(m)) m.addTo(map); }
      else{ if(map.hasLayer(m)) map.removeLayer(m); }
    });
  }

  function render(){
    cards.innerHTML='';
    aqs.filter(a=> (current==='すべて' || REGIONS[current].includes(a.pref)) && (!currentTag || (currentTag==='__visited' ? myVisits.has(a.name) : (a.tags||[]).includes(currentTag)))).forEach(a=>{
      const v = a.videos[0];
      const thumb = v ? `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg` : '';
      const card = document.createElement('div');
      card.className = 'card' + (a.upcoming?' upcoming':'') + (myVisits.has(a.name)?' visited':'');
      card.innerHTML = `
        ${v?`<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank"><img loading="lazy" src="${thumb}" alt="${a.name}"></a>`:`<div style="aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:#e0f2fe;font-size:2rem">🔜</div>`}
        <div class="body">
          <span class="pref">${a.pref}</span>
          <h3>${a.name} ${a.closed_flag?'<span class="badge-closed">閉館</span>':''}</h3>
          <p class="hl">${a.highlight||''}</p>
          ${animalChips(a)}
          ${(a.fee||a.closed)&&!a.closed_flag?`<div class="cinfo">${a.fee?`💰 大人 ${a.fee}`:''}${a.child?`<br>🧒 子ども ${a.child}`:''}${a.closed?`<br>🗓 休み：${a.closed}`:''}${a.gift?`<br>🎁 おみやげ：${a.gift}`:''}</div>`:''}
          <div class="links">
            ${a.videos.map((vv,i)=>`<a class="tab yt" href="https://www.youtube.com/watch?v=${vv.id}" target="_blank">▶ 動画${a.videos.length>1?(i+1):''}</a>`).join('')}
            ${a.url?`<a class="tab hp" href="${a.url}" target="_blank">公式サイト</a>`:''}
            ${a.sns&&a.sns.x?`<a class="tab hp" href="${a.sns.x}" target="_blank">𝕏</a>`:''}
            ${a.sns&&a.sns.instagram?`<a class="tab hp" href="${a.sns.instagram}" target="_blank">📷 Insta</a>`:''}
            ${visitBtn(a)}
          </div>
        </div>`;
      cards.appendChild(card);
    });
  }
  render();
  updateMyCount();
});
</script>
</body>
</html>
